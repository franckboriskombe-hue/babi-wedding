<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 110" role="img" aria-label="Babi Wedding">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0C896"/>
      <stop offset="55%" stop-color="#C8A66A"/>
      <stop offset="100%" stop-color="#9C7E45"/>
    </linearGradient>
  </defs>

  <!-- Petite étoile / fleur décorative à gauche -->
  <g transform="translate(8, 36)" fill="url(#gold)">
    <path d="M16 0 L18.5 13.5 L32 16 L18.5 18.5 L16 32 L13.5 18.5 L0 16 L13.5 13.5 Z"/>
  </g>

  <!-- "Babi" en serif italique, en émeraude -->
  <text x="56" y="58"
        font-family="'Cormorant Garamond', 'Times New Roman', serif"
        font-style="italic"
        font-weight="500"
        font-size="58"
        fill="#005B4F"
        letter-spacing="-1">Babi</text>

  <!-- Filet doré séparateur -->
  <rect x="56" y="72" width="240" height="0.8" fill="url(#gold)"/>

  <!-- "WEDDING" en sans-serif espacé, noir profond -->
  <text x="56" y="94"
        font-family="'Montserrat', sans-serif"
        font-weight="600"
        font-size="14"
        fill="#111111"
        letter-spacing="9">WEDDING</text>
</svg>
