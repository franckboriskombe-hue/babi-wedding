<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Motif géométrique inspiré bogolan/kente, en filigrane doré -->
  <defs>
    <pattern id="bw-pattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="#C8A66A" stroke-width="0.8" opacity="0.5">
        <!-- losange central -->
        <path d="M50 20 L80 50 L50 80 L20 50 Z"/>
        <!-- petites étoiles aux angles -->
        <g transform="translate(50 50)">
          <path d="M0 -6 L1 -1 L6 0 L1 1 L0 6 L-1 1 L-6 0 L-1 -1 Z" fill="#C8A66A" stroke="none" opacity="0.7"/>
        </g>
        <!-- traits diagonaux -->
        <line x1="0" y1="0" x2="20" y2="20"/>
        <line x1="100" y1="0" x2="80" y2="20"/>
        <line x1="0" y1="100" x2="20" y2="80"/>
        <line x1="100" y1="100" x2="80" y2="80"/>
      </g>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#bw-pattern)"/>
</svg>
